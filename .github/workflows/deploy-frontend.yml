name: Deploy Frontend Apps to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dine-in-admin/package-lock.json
            dine-in-kitchen/package-lock.json
            dine-in-order/package-lock.json

      - name: Build dine-in-admin
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PROD_API_BASE_URL="https://dinein-full-stack-restaurant-ordering.onrender.com/api"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_PREFIX=""
          else
            BASE_PREFIX="/$REPO_NAME"
          fi

          cd dine-in-admin
          npm ci
          npx tsc -b
          VITE_API_BASE_URL="$PROD_API_BASE_URL" npx vite build --base="${BASE_PREFIX}/admin/"

      - name: Build dine-in-kitchen
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PROD_API_BASE_URL="https://dinein-full-stack-restaurant-ordering.onrender.com/api"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_PREFIX=""
          else
            BASE_PREFIX="/$REPO_NAME"
          fi

          cd dine-in-kitchen
          npm ci
          npx tsc -b
          VITE_API_BASE_URL="$PROD_API_BASE_URL" npx vite build --base="${BASE_PREFIX}/kitchen/"

      - name: Build dine-in-order
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PROD_API_BASE_URL="https://dinein-full-stack-restaurant-ordering.onrender.com/api"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_PREFIX=""
          else
            BASE_PREFIX="/$REPO_NAME"
          fi

          cd dine-in-order
          npm ci
          npx tsc -b
          VITE_API_BASE_URL="$PROD_API_BASE_URL" npx vite build --base="${BASE_PREFIX}/order/"

      - name: Prepare Pages content
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_PREFIX=""
          else
            BASE_PREFIX="/$REPO_NAME"
          fi

          mkdir -p _site
          cp -R dine-in-admin/dist _site/admin
          cp -R dine-in-kitchen/dist _site/kitchen
          cp -R dine-in-order/dist _site/order

          RESTORE_SCRIPT='<script>(function(){var r=sessionStorage.getItem("spa-redirect");if(r){sessionStorage.removeItem("spa-redirect");history.replaceState(null,"",r);}})();</script>'
          for app_dir in admin kitchen order; do
            if [ -f "_site/${app_dir}/index.html" ]; then
              sed -i "s|</head>|${RESTORE_SCRIPT}</head>|" "_site/${app_dir}/index.html"
            fi
          done

          touch _site/.nojekyll

          cat > _site/404.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting...</title>
            <script>
              // GitHub Pages SPA redirect hack
              var path = window.location.pathname;
              var search = window.location.search;
              var hash = window.location.hash;

              // Store the full path for the SPA to restore
              sessionStorage.setItem('spa-redirect', path + search + hash);

              // Detect which app this belongs to and redirect to its index
              var base = '${BASE_PREFIX}';
              var apps = ['/admin/', '/kitchen/', '/order/'];
              var target = base + '/';  // default to landing page

              for (var i = 0; i < apps.length; i++) {
                if (path.indexOf(base + apps[i]) === 0) {
                  target = base + apps[i];
                  break;
                }
              }

              window.location.replace(target);
            </script>
          </head>
          <body>
            Redirecting...
          </body>
          </html>
          EOF

          cat > _site/index.html << EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>DineIn Platform</title>
            <style>
              :root {
                color-scheme: dark;
                --bg: #0b1220;
                --panel: #121b2d;
                --border: #27324a;
                --text: #e6edf9;
                --muted: #9fb0cf;
                --accent: #52b5ff;
              }

              * { box-sizing: border-box; }

              body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", "SF Pro Text", -apple-system, BlinkMacSystemFont, sans-serif;
                background: radial-gradient(1200px 600px at 20% -10%, #1a2742 0%, var(--bg) 55%);
                color: var(--text);
                display: grid;
                place-items: center;
                padding: 2rem;
              }

              main {
                width: min(960px, 100%);
              }

              h1 {
                margin: 0 0 0.75rem;
                font-size: clamp(1.8rem, 3vw, 2.6rem);
              }

              p {
                margin: 0 0 1.5rem;
                color: var(--muted);
              }

              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 1rem;
              }

              a.card {
                text-decoration: none;
                color: inherit;
                background: linear-gradient(180deg, rgba(82, 181, 255, 0.12), rgba(255, 255, 255, 0.02));
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 1rem;
                transition: transform 120ms ease, border-color 120ms ease;
              }

              a.card:hover {
                transform: translateY(-2px);
                border-color: var(--accent);
              }

              .title {
                font-weight: 600;
                display: block;
                margin-bottom: 0.35rem;
              }

              .path {
                color: var(--muted);
                font-size: 0.9rem;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>DineIn Platform</h1>
              <p>Select an app to continue.</p>
              <div class="grid">
                <a class="card" href="${BASE_PREFIX}/admin/">
                  <span class="title">Admin Dashboard</span>
                  <span class="path">${BASE_PREFIX}/admin</span>
                </a>
                <a class="card" href="${BASE_PREFIX}/kitchen/">
                  <span class="title">Kitchen Display</span>
                  <span class="path">${BASE_PREFIX}/kitchen</span>
                </a>
                <a class="card" href="${BASE_PREFIX}/order/">
                  <span class="title">Order Online</span>
                  <span class="path">${BASE_PREFIX}/order</span>
                </a>
              </div>
            </main>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
